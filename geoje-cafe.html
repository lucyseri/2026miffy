<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거제 카페</title>
  <link rel="icon" href="img/favicon.ico">
  <!-- js -->
  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="js/jq_common.js" defer></script>
  <script src="js/js_sub1-geoje.js" type="module"></script>
  <!-- style -->
  <link rel="stylesheet" href="css/page/sub1.css">
</head>
<body>
  <!-- header -->
  <div id="header-include"></div>
  <main>
    <div id="sub-banner">
      <img src="img/banner/sub-page-banner-geoje.png" alt="거제 카페">
    </div>
    <section class="product-sec">
      <div class="title">
        <h2>거제 카페</h2>
        <div class="select-box">
          <select name="display" id="display">
            <option value="latest">최신순</option>
            <option value="lowest">저렴한순</option>
          </select>
          <span class="select-btn"><span class="ir_pm">더보기</span></span>
        </div>
      </div>
      <div class="product-con">
        <ul>
          <li>
            <a href="#" class="product-list">
              <img src="img/product/classic-product-0.png" alt="미피 미니 자수 파우치">
              <div class="info">
                <p class="category">미피 클래식</p>
                <p class="name">미피 미니 자수 파우치</p>
                <p class="price">
                  <span class="original-price">15,000원</span>
                  <span class="final-price">12,000원</span>
                </p>
              </div>
            </a>
          </li>
          <li>
            <a href="#" class="product-list">
              <img src="img/product/classic-product-0.png" alt="미피 미니 자수 파우치">
              <div class="info">
                <p class="category">미피 클래식</p>
                <p class="name">미피 미니 자수 파우치</p>
                <p class="price">
                  <span class="original-price">15,000원</span>
                  <span class="final-price">12,000원</span>
                </p>
              </div>
            </a>
          </li>
          <li>
            <a href="#" class="product-list">
              <img src="img/product/classic-product-0.png" alt="미피 미니 자수 파우치">
              <div class="info">
                <p class="category">미피 클래식</p>
                <p class="name">미피 미니 자수 파우치</p>
                <p class="price">
                  <span class="original-price">15,000원</span>
                  <span class="final-price">12,000원</span>
                </p>
              </div>
            </a>
          </li>
          <li>
            <a href="#" class="product-list">
              <img src="img/product/classic-product-0.png" alt="미피 미니 자수 파우치">
              <div class="info">
                <p class="category">미피 클래식</p>
                <p class="name">미피 미니 자수 파우치</p>
                <p class="price">
                  <span class="original-price">15,000원</span>
                  <span class="final-price">12,000원</span>
                </p>
              </div>
            </a>
          </li>
        </ul>
      </div>
      <div class="product-pager">
        <span class="arrow left-arrow"><span class="ir_pm">이전</span></span>
        <ul>
          <li class="active">1</li>
          <li>2</li>
        </ul>
        <span class="arrow right-arrow"><span class="ir_pm">다음</span></span>
      </div>
    </section>
  </main>
  <!-- footer -->
  <div id="footer-include"></div>
</body>
</html>
