<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스탬프 이벤트</title>
  <link rel="icon" href="img/favicon.ico">
  <!-- js -->
  <script src="js/jquery-3.7.1.min.js"></script>
  <script src="js/jq_common.js" defer></script>
  <!-- style -->
  <link rel="stylesheet" href="css/page/event.css">
</head>
<body>
  <!-- header -->
  <div id="header-include"></div>
  <main>
    <section class="info-sec">
      <div class="title">
        <h3>[이벤트]오프라인 스토어 방문 스탬프 이벤트</h3>
        <p class="date">2026.04.01</p>
      </div>
      <div class="sec-con">
        <div class="event-info">
          <img src="img/stamp/stamp-event-detaile-0.png" alt="스템프 이벤트">
          <img src="img/stamp/stamp-event-detaile-1.png" alt="스탬프 이벤트">
          <img src="img/stamp/stamp-event-detaile-2.png" alt="스탬프 이벤트">
          <p>오프라인 미피 스토어와 카페에서<br>한정판 미피 구매하고 스탬프를 받으세요!</p>
          <p>QR 코드 인증하고 스탬프를 다 모으면<br>스페셜 미피가 오픈됩니다!</p>
        </div>
        <div class="collected-stamp">
          <h3>내가 모은 스탬프</h3>
          <div class="top-stamp">
            <img src="img/stamp/stamp-img0.png" alt="스탬프">
            <img src="img/stamp/stamp-img1.png" alt="스탬프">
          </div>
          <div class="bottom-stamp">
            <img src="img/stamp/stamp-img2.png" alt="스탬프">
            <img src="img/stamp/stamp-img3.png" alt="스탬프">
            <img src="img/stamp/stamp-img4.png" alt="스탬프">
          </div>
          <a href="#" class="code-btn">QR코드 인증하기</a>
        </div>
      </div>
    </section>
    <section class="product-sec">
      <h3>스페셜 미피</h3>
      <div class="sec-con">
        <a href="#" class="product-list">
          <div class="img-thum">
            <img src="img/product/special-product-0.png" alt="스페셜 멜라니 블랭킷">
          </div>
          <div class="info">
            <p class="category">미피 스페셜</p>
            <p class="name">스페셜 멜라니 블랭킷</p>
            <p class="price">
              <span class="final-price">4,500원</span>
            </p>
          </div>
        </a>
        <a href="#" class="product-list">
          <div class="img-thum">
            <img src="img/product/special-product-1.png" alt="스페셜 한복 미피 인형">
          </div>
          <div class="info">
            <p class="category">미피 스페셜</p>
            <p class="name">스페셜 한복 미피 인형</p>
            <p class="price">
              <span class="final-price">4,500원</span>
            </p>
          </div>
        </a>
        <a href="#" class="product-list">
          <div class="img-thum">
            <img src="img/product/special-product-2.png" alt="스페셜 뽀삐 크로스백">
          </div>
          <div class="info">
            <p class="category">미피 스페셜</p>
            <p class="name">스페셜 뽀삐 크로스백</p>
            <p class="price">
              <span class="final-price">4,500원</span>
            </p>
          </div>
        </a>
        <a href="#" class="product-list">
          <div class="img-thum">
            <img src="img/product/special-product-3.png" alt="스페셜 한복 멜라니 인형">
          </div>
          <div class="info">
            <p class="category">미피 스페셜</p>
            <p class="name">스페셜 한복 멜라니 인형</p>
            <p class="price">
              <span class="final-price">4,500원</span>
            </p>
          </div>
        </a>
        <a href="#" class="product-list">
          <div class="img-thum">
            <img src="img/product/special-product-4.png" alt="스페셜 볼끼 보리스">
          </div>
          <div class="info">
            <p class="category">미피 스페셜</p>
            <p class="name">스페셜 볼끼 보리스</p>
            <p class="price">
              <span class="final-price">4,500원</span>
            </p>
          </div>
        </a>
      </div>
    </section>
  </main>
  <!-- footer -->
  <div id="footer-include"></div>
</body>

</html>
